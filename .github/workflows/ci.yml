name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --group dev
      - name: Lint
        run: uv run ruff check src/
      - name: Type check
        run: uv run mypy src/
      - name: Run tests
        run: uv run pytest --tb=short -q --cov=src --cov-report=term-missing
      - name: Verify engines
        run: uv run sfdb verify

  benchmark:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --group dev
      - name: Quick benchmark
        run: uv run sfdb benchmark --size small --workloads C1,C2,C5,C8,C9,C10
      - name: Generate dashboard
        run: uv run sfdb dashboard
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: results/

  paper:
    runs-on: ubuntu-latest
    needs: benchmark
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --group dev
      - name: Install TeX
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended texlive-bibtex-extra latexmk
      - name: Generate paper
        run: uv run python scripts/generate_paper.py
      - name: Upload paper
        uses: actions/upload-artifact@v4
        with:
          name: paper
          path: paper/main.pdf

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --group dev
      - name: Build Sphinx docs
        run: |
          cd docs
          uv run sphinx-build -b html . _build/html
      - name: Upload docs
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: docs/_build/html

  reproduce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Full reproduction
        run: uv run python scripts/reproduce.py
